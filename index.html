<style>
:root {
  --red:#E10600; --bg:#0d0d0d; --surface:#181818; --surface2:#222;
  --border:#2c2c2c; --text:#f0f0f0; --muted:#666;
  --tab-h:62px; --header-h:60px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;height:100dvh;background:var(--bg);color:var(--text);font-family:"Barlow Condensed",sans-serif;overflow:hidden;display:flex;flex-direction:column;-webkit-text-size-adjust:100%}
/* HEADER */
header{height:calc(var(--header-h) + env(safe-area-inset-top,0px));padding-top:env(safe-area-inset-top,0px);background:#080808;border-bottom:2px solid var(--red);display:flex;align-items:center;justify-content:space-between;padding-left:14px;padding-right:14px;flex-shrink:0;z-index:10}
.logo{display:flex;align-items:center}
.logo-img{height:38px;width:auto;display:block}
.session-status{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);letter-spacing:.5px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:blink 1.1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
/* PTR */
.ptr-bar{height:0;overflow:hidden;background:#080808;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;letter-spacing:1px;color:var(--muted);transition:height .2s;flex-shrink:0}
.ptr-bar.visible{height:36px}
.ptr-spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;display:none}
.ptr-bar.loading .ptr-spin{display:block}
/* TABS */
nav.tabs{height:calc(var(--tab-h) + env(safe-area-inset-bottom,0px));background:#080808;border-top:1px solid var(--border);display:flex;flex-shrink:0;order:99;padding-bottom:env(safe-area-inset-bottom,0px)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border:none;background:none;color:var(--muted);font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:color .2s;-webkit-tap-highlight-color:transparent;border-top:2px solid transparent}
.tab.active{color:var(--red);border-top-color:var(--red)}
.tab svg{width:26px;height:26px}
/* CONTENT */
.content{flex:1;overflow:hidden;position:relative}
.pane{display:none;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 8px}
.pane.active{display:block}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* SHARED */
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px 20px;color:var(--muted);font-size:13px}
.error-box{background:#1c0000;border:1px solid #3a0000;border-radius:6px;padding:14px;color:#ff7070;font-size:14px;text-align:center;margin:12px 0}
.section-hd{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin:12px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
/* SESSION BANNER */
.session-banner{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.session-label{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--muted);margin-bottom:2px}
.session-name{font-size:19px;font-weight:700}
.session-right{text-align:right}
.lap-big{font-family:"Share Tech Mono",monospace;font-size:26px;color:var(--red);line-height:1}
.lap-lbl{font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:2px}
/* LIVE TIMING TABLE */
.timing-tbl{width:100%;border-collapse:collapse}
.timing-tbl th{font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;padding:4px 4px;text-align:right}
.timing-tbl th:first-child,.timing-tbl th:nth-child(2){text-align:left}
.timing-tbl td{padding:7px 4px;border-bottom:1px solid var(--border);vertical-align:middle;text-align:right}
.timing-tbl td:first-child{text-align:left;font-family:"Share Tech Mono",monospace;font-size:12px;color:var(--muted);width:24px}
.timing-tbl td:nth-child(2){text-align:left}
.drv-code{font-size:16px;font-weight:700;letter-spacing:.5px;display:block}
.drv-full{font-size:10px;color:var(--muted);display:block;margin-top:1px}
.mono{font-family:"Share Tech Mono",monospace;font-size:12px}
.gap-leader{color:var(--muted)}
.interval{color:#60a5fa}
.fastest-lap{color:#a855f7}
.tyre-badge{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;font-size:8px;font-weight:900;color:#000}
.tyre-SOFT{background:#e10600}.tyre-MEDIUM{background:#f5d800}.tyre-HARD{background:#e0e0e0}
.tyre-INTERMEDIATE{background:#39d353}.tyre-WET{background:#0ea5e9;color:#fff}
.spark-cell{padding:4px!important}
/* STANDINGS */
.std-toggle{display:flex;background:var(--surface);border-radius:6px;padding:3px;gap:3px;margin-bottom:12px}
.std-btn{flex:1;padding:8px 0;text-align:center;font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:none;border-radius:4px;cursor:pointer;color:var(--muted);background:none;transition:all .18s;-webkit-tap-highlight-color:transparent}
.std-btn.active{background:var(--red);color:#fff}
.std-tbl{width:100%;border-collapse:collapse}
.std-tbl th{font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;padding:4px 6px;text-align:right}
.std-tbl th:nth-child(2){text-align:left}
.std-row td{padding:8px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
.std-row td:first-child{font-family:"Share Tech Mono",monospace;font-size:12px;color:var(--muted);text-align:center;width:28px}
.std-row td:last-child{font-family:"Share Tech Mono",monospace;font-size:18px;font-weight:600;text-align:right}
.std-name{font-size:16px;font-weight:700}
.std-flag{font-size:14px;margin-right:4px}
.std-sub{font-size:11px;color:var(--muted);margin-top:1px}
.gap-bar-wrap{height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden}
.gap-bar-fill{height:4px;border-radius:2px;transition:width .6s ease}
.std-gap{font-family:"Share Tech Mono",monospace;font-size:10px;color:var(--muted);margin-top:3px}
/* SCHEDULE */
.race-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px 14px;margin-bottom:9px;display:flex;gap:12px;align-items:flex-start;border-left:3px solid var(--border)}
.race-card.next-race{border-left-color:var(--red)}
.race-card.past{opacity:.5}
.rnd-badge{background:var(--surface2);color:var(--muted);font-family:"Share Tech Mono",monospace;font-size:14px;padding:6px 8px;border-radius:4px;min-width:36px;text-align:center;flex-shrink:0}
.race-card.next-race .rnd-badge{background:var(--red);color:#fff}
.race-info{flex:1;min-width:0}
.next-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--red);margin-bottom:3px}
.race-name{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.race-circuit{font-size:12px;color:var(--muted);margin-top:2px}
.race-date{font-family:"Share Tech Mono",monospace;font-size:12px;color:var(--muted);margin-top:6px}
/* NO SESSION */
.ns-page{padding:0 0 20px}
.ns-hero{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:8px;padding:14px 16px;margin-bottom:12px}
.ns-round{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--red);margin-bottom:4px}
.ns-racename{font-size:22px;font-weight:900;line-height:1.1;margin-bottom:4px}
.ns-circuit{font-size:13px;color:var(--muted);margin-bottom:10px}
.ns-countdown{display:flex;align-items:baseline;gap:8px}
.ns-days-num{font-family:"Share Tech Mono",monospace;font-size:52px;color:var(--red);line-height:1}
.ns-days-lbl{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--muted)}
.ns-racetime{font-family:"Share Tech Mono",monospace;font-size:13px;color:var(--muted);margin-top:8px}
.ns-img{width:100%;max-height:160px;object-fit:cover;border-radius:6px;margin-bottom:0;display:block;background:var(--surface2)}
.ns-sessions{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:4px}
.ns-session{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);gap:10px}
.ns-session:last-child{border-bottom:none}
.ns-session.ns-race{background:#1a0000}
.ns-stype{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);width:90px;flex-shrink:0;text-transform:uppercase}
.ns-session.ns-race .ns-stype{color:var(--red)}
.ns-sdot{width:5px;height:5px;border-radius:50%;background:var(--border);flex-shrink:0}
.ns-session.ns-race .ns-sdot{background:var(--red)}
.ns-stime{font-family:"Share Tech Mono",monospace;font-size:12px;color:var(--text);flex:1}
/* WEATHER */
.ns-weather{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:14px}
.wx-icon{font-size:32px;line-height:1}
.wx-info{flex:1}
.wx-temp{font-family:"Share Tech Mono",monospace;font-size:22px;color:var(--text)}
.wx-desc{font-size:12px;color:var(--muted);margin-top:2px}
.wx-rain{font-size:11px;color:#60a5fa;margin-top:2px}
.wx-label{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
/* LAST RACE */
.lr-podium{display:flex;gap:8px;margin-bottom:4px}
.lr-pod{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.lr-pod.p1{border-top:2px solid #c9a227}
.lr-pod.p2{border-top:2px solid #a0a0a0}
.lr-pod.p3{border-top:2px solid #8b4513}
.lr-pos{font-family:"Share Tech Mono",monospace;font-size:20px;font-weight:700}
.lr-p1 .lr-pos{color:#c9a227}.lr-p2 .lr-pos{color:#a0a0a0}.lr-p3 .lr-pos{color:#cd7f32}
.lr-code{font-size:18px;font-weight:900;margin-top:2px}
.lr-pts{font-size:11px;color:var(--muted);margin-top:2px}
.lr-tbl{width:100%;border-collapse:collapse}
.lr-row td{padding:7px 6px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px}
.lr-row td:first-child{font-family:"Share Tech Mono",monospace;font-size:12px;color:var(--muted);text-align:center;width:28px}
.lr-row td:last-child{font-family:"Share Tech Mono",monospace;font-size:12px;text-align:right;color:var(--muted)}
.lr-winner{color:#c9a227}
/* TOP 5 */
.ns-driver{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);gap:10px}
.ns-driver:last-child{border-bottom:none}
.ns-top5{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.ns-dpos{font-family:"Share Tech Mono",monospace;font-size:12px;color:var(--muted);width:18px;text-align:center;flex-shrink:0}
.ns-dbar{width:3px;height:26px;border-radius:2px;flex-shrink:0}
.ns-dinfo{flex:1;min-width:0}
.ns-dname{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ns-dteam{font-size:11px;color:var(--muted);margin-top:1px}
.ns-dpts{font-family:"Share Tech Mono",monospace;font-size:15px;font-weight:600}
/* HISTORY TAB */
.hist-race{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.hist-race:active{background:var(--surface2)}
.hist-rnd{background:var(--surface2);color:var(--muted);font-family:"Share Tech Mono",monospace;font-size:13px;padding:5px 7px;border-radius:4px;min-width:34px;text-align:center;flex-shrink:0}
.hist-race.has-results .hist-rnd{background:var(--red);color:#fff}
.hist-info{flex:1;min-width:0}
.hist-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-winner{font-size:12px;color:var(--muted);margin-top:2px}
.hist-arrow{color:var(--muted);font-size:16px}
.hist-detail-back{display:flex;align-items:center;gap:8px;padding:4px 0 12px;cursor:pointer;color:var(--red);font-size:14px;font-weight:700;letter-spacing:1px}
.hist-detail-back svg{width:18px;height:18px}
.hist-res-row td{padding:8px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
.hist-res-row td:first-child{font-family:"Share Tech Mono",monospace;font-size:12px;color:var(--muted);text-align:center;width:28px}
.hist-res-row td:last-child{font-family:"Share Tech Mono",monospace;font-size:12px;text-align:right;color:var(--muted)}
.hist-res-name{font-size:15px;font-weight:700}
.hist-res-team{font-size:11px;color:var(--muted)}
.hist-fastest{color:#a855f7;font-size:10px;font-weight:700;letter-spacing:.5px}

/* ── TRACKS TAB ─────────────────────────────────────────────────────────── */
.trk-card {
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  margin-bottom:9px; overflow:hidden; cursor:pointer;
  -webkit-tap-highlight-color:transparent; transition:border-color .15s;
}
.trk-card:active { border-color:var(--red); }
.trk-card.trk-next { border-left:3px solid var(--red); }
.trk-card.trk-past { opacity:.55; }
.trk-header { display:flex; align-items:center; gap:12px; padding:12px 14px; }
.trk-rnd {
  background:var(--surface2); color:var(--muted); font-family:"Share Tech Mono",monospace;
  font-size:13px; padding:5px 7px; border-radius:4px; min-width:34px;
  text-align:center; flex-shrink:0;
}
.trk-card.trk-next .trk-rnd { background:var(--red); color:#fff; }
.trk-info { flex:1; min-width:0; }
.trk-name { font-size:16px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.trk-loc  { font-size:12px; color:var(--muted); margin-top:2px; }
.trk-date { font-family:"Share Tech Mono",monospace; font-size:11px; color:var(--muted); margin-top:4px; }
.trk-arrow { color:var(--muted); font-size:18px; flex-shrink:0; }
/* detail */
.trk-detail-back { display:flex; align-items:center; gap:8px; padding:4px 0 14px; cursor:pointer; color:var(--red); font-size:14px; font-weight:700; letter-spacing:.5px; }
.trk-detail-back svg { width:18px; height:18px; }
.trk-layout-img { width:100%; max-height:220px; object-fit:contain; border-radius:8px; background:var(--surface); display:block; margin-bottom:12px; }
.trk-stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.trk-stat { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 12px; }
.trk-stat-lbl { font-size:10px; font-weight:700; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; margin-bottom:4px; }
.trk-stat-val { font-family:"Share Tech Mono",monospace; font-size:16px; color:var(--text); }
.trk-stat-sub { font-size:11px; color:var(--muted); margin-top:2px; }
.trk-drs-bar { display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
.trk-drs-zone { background:#27F4D220; border:1px solid #27F4D250; border-radius:4px; padding:3px 8px; font-size:11px; color:#27F4D2; font-family:"Share Tech Mono",monospace; }
.trk-img-placeholder { width:100%; height:160px; background:var(--surface); border-radius:8px; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:13px; margin-bottom:12px; }

/* ── NEWS TAB ───────────────────────────────────────────────────────────────── */
.news-toggle { display:flex; background:var(--surface); border-radius:6px; padding:3px; gap:3px; margin-bottom:12px; }
.news-btn { flex:1; padding:9px 0; text-align:center; font-family:"Barlow Condensed",sans-serif; font-size:13px; font-weight:700; letter-spacing:1px; text-transform:uppercase; border:none; border-radius:4px; cursor:pointer; color:var(--muted); background:none; transition:all .18s; -webkit-tap-highlight-color:transparent; }
.news-btn.active { background:var(--red); color:#fff; }
.news-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:13px 14px; margin-bottom:9px; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:border-color .15s; }
.news-card:active { border-color:var(--red); }
.news-meta { display:flex; align-items:center; gap:7px; margin-bottom:7px; }
.news-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.news-src { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
.news-time { font-size:11px; color:var(--muted); margin-left:auto; font-family:"Share Tech Mono",monospace; }
.news-headline { font-size:16px; font-weight:700; line-height:1.3; margin-bottom:5px; }
.news-summary { font-size:12px; color:var(--muted); line-height:1.5; }
.news-empty { text-align:center; padding:48px 24px; color:var(--muted); font-size:14px; }
.news-load-more { width:100%; padding:12px; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--muted); font-family:"Barlow Condensed",sans-serif; font-size:14px; font-weight:700; letter-spacing:1px; cursor:pointer; margin-top:4px; text-transform:uppercase; }
</style>
</head>

// ── Cache helpers (localStorage) ──────────────────────────────────────────────
function cacheSet(key,data) {
  try { localStorage.setItem('f1_'+key,JSON.stringify({ts:Date.now(),data})); } catch(e) {}
}
function cacheGet(key,maxAgeMs) {
  try {
    const raw = localStorage.getItem('f1_'+key);
    if (!raw) return null;
    const {ts,data} = JSON.parse(raw);
    if (maxAgeMs && Date.now()-ts > maxAgeMs) return null;
    return data;
  } catch(e) { return null; }
}

// ── JSONP ─────────────────────────────────────────────────────────────────────
function getJSONP(url,timeoutMs) {
  timeoutMs = timeoutMs||12000;
  return new Promise(function(resolve,reject) {
    var cb='_f1cb'+Date.now()+Math.random().toString(36).slice(2,7);
    var sc=document.createElement('script');
    var done=false;
    var timer=setTimeout(function() {
      if(done)return;done=true;delete window[cb];
      if(sc.parentNode)document.head.removeChild(sc);
      reject(new Error('JSONP timed out'));
    },timeoutMs);
    window[cb]=function(data) {
      if(done)return;done=true;clearTimeout(timer);delete window[cb];
      if(sc.parentNode)document.head.removeChild(sc);resolve(data);
    };
    sc.onerror=function() {
      if(done)return;done=true;clearTimeout(timer);delete window[cb];
      reject(new Error('JSONP error'));
    };
    var sep=url.indexOf('?')>=0?'&':'?';
    sc.src=url+sep+'callback='+cb;
    document.head.appendChild(sc);
  });
}

// ── Fetch with proxy cascade ──────────────────────────────────────────────────
function get(url,timeoutMs) {
  timeoutMs=timeoutMs||10000;
  var candidates=[url,'https://corsproxy.io/?'+encodeURIComponent(url),'https://api.allorigins.win/raw?url='+encodeURIComponent(url)];
  var lastErr=null;
  function attempt(i) {
    if(i>=candidates.length) return Promise.reject(lastErr||new Error('All routes failed'));
    var timeoutP=new Promise(function(_,rej){setTimeout(function(){rej(new Error('Timed out'));} ,timeoutMs);});
    var fetchP=fetch(candidates[i]).then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);return r.text();
    }).then(function(t){return JSON.parse(t);});
    return Promise.race([fetchP,timeoutP]).catch(function(e){lastErr=e;return attempt(i+1);});
  }
  return attempt(0);
}

function jolpicaGet(url) {
  return getJSONP(url,12000).catch(function(e) {
    console.warn('[F1] JSONP failed, trying proxy:',e.message);
    return get(url,10000);
  });
}

// ── Pull-to-refresh ───────────────────────────────────────────────────────────
(function() {
  var content = document.getElementById('mainContent');
  var bar = document.getElementById('ptrBar');
  var txt = document.getElementById('ptrText');
  var spin = document.getElementById('ptrSpin');
  var startY = 0, pulling = false, triggered = false;

  content.addEventListener('touchstart', function(e) {
    var pane = document.querySelector('.pane.active');
    if (pane && pane.scrollTop === 0) startY = e.touches[0].clientY;
    else startY = 0;
  }, {passive:true});

  content.addEventListener('touchmove', function(e) {
    if (!startY) return;
    var dy = e.touches[0].clientY - startY;
    if (dy > 10 && !triggered) {
      pulling = true;
      bar.classList.add('visible');
      txt.textContent = dy > 60 ? '↑ Release to refresh' : '↓ Pull to refresh';
    }
  }, {passive:true});

  content.addEventListener('touchend', function(e) {
    if (!pulling) return;
    pulling = false;
    var dy = (e.changedTouches[0].clientY - startY);
    startY = 0;
    if (dy > 60) {
      triggered = true;
      spin.style.display = 'block';
      txt.textContent = 'Refreshing…';
      bar.classList.add('loading');
      refreshCurrentTab().then(function() {
        triggered = false;
        bar.classList.remove('visible','loading');
        spin.style.display = 'none';
      });
    } else {
      bar.classList.remove('visible');
    }
  }, {passive:true});
})();

// ── LIVE TAB ──────────────────────────────────────────────────────────────────
async function loadLive() {
  clearTimeout(S.refreshTimer);
  document.getElementById('pane-live').innerHTML=
    '<div class="loader"><div class="spinner"></div><span id="loadMsg">Loading…</span></div>';

  if (!S.schedule) {
    // Try cache first
    const cached = cacheGet('schedule', 3600000);
    if (cached) { S.schedule=cached; renderSchedule(); }
    try {
      const data = await jolpicaGet(JOLPICA+'/current.json');
      if (data?.MRData?.RaceTable?.Races) {
        S.schedule=data.MRData.RaceTable.Races;
        cacheSet('schedule',S.schedule);
        renderSchedule();
      }
    } catch(e) { console.warn('[F1] schedule load failed:',e.message); }
  }

  const now=new Date();
  const activeRace=isRaceWeekendNow(S.schedule||[],now);

  if (!activeRace) {
    await renderNoSession();
    S.refreshTimer=setTimeout(loadLive,IDLE_REFRESH_MS);
    return;
  }

  const lm=document.getElementById('loadMsg');
  if(lm) lm.textContent='Fetching live timing…';

  try {
    const sessions=await get(OPENF1+'/sessions?session_key=latest');
    if(!sessions||!sessions.length) throw new Error('No session data');
    sessions.sort((a,b)=>new Date(b.date_start)-new Date(a.date_start));
    const sess=sessions[0];
    S.session=sess;
    const start=new Date(sess.date_start);
    const end=sess.date_end?new Date(sess.date_end):null;
    S.isLive=end?(now>=start&&now<=end):(now>=start);
    const isRecent=end?((now-end)/36e5<RECENT_SESSION_H):false;
    if(S.isLive||isRecent) { await loadSessionData(); }
    else { await renderNoSession(); }
  } catch(e) {
    console.warn('[F1] OpenF1 failed:',e.message);
    await renderNoSession();
    const pane=document.getElementById('pane-live');
    if(pane) {
      const b=document.createElement('div');
      b.style.cssText='background:#1c0000;border:1px solid #3a0000;border-radius:6px;padding:10px 14px;color:#ff9090;font-size:12px;margin:0 0 12px';
      b.innerHTML='⚠️ Live timing unavailable — <button onclick="loadLive()" style="background:none;border:none;color:var(--red);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;padding:0">Retry</button>';
      pane.insertBefore(b,pane.firstChild);
    }
  }
  S.refreshTimer=setTimeout(loadLive,S.isLive?LIVE_REFRESH_MS:IDLE_REFRESH_MS);
}

function isRaceWeekendNow(races,now) {
  if(!races||!races.length) return null;
  for(var i=0;i<races.length;i++) {
    var r=races[i];
    var rd=new Date(r.date+'T'+(r.time||'12:00:00Z'));
    var fp1=r.FirstPractice&&r.FirstPractice.date
      ?new Date(r.FirstPractice.date+'T'+(r.FirstPractice.time||'06:00:00Z'))
      :new Date(rd.getTime()-2*864e5);
    var end=new Date(rd.getTime()+4*36e5);
    if(now>=fp1&&now<=end) return r;
  }
  return null;
}

// ── Live session data ─────────────────────────────────────────────────────────
async function loadSessionData() {
  const key=S.session.session_key;
  try {
    const [drivers,positions,intervals,laps,stints]=await Promise.all([
      get(OPENF1+'/drivers?session_key='+key),
      get(OPENF1+'/position?session_key='+key),
      get(OPENF1+'/intervals?session_key='+key),
      get(OPENF1+'/laps?session_key='+key),
      get(OPENF1+'/stints?session_key='+key).catch(()=>[]),
    ]);
    S.sessionDrivers={};
    for(const d of drivers) S.sessionDrivers[d.driver_number]=d;
    S.livePositions={};
    for(const p of positions) S.livePositions[p.driver_number]=p;
    S.liveIntervals={};
    for(const iv of intervals) S.liveIntervals[iv.driver_number]=iv;
    // Build lap stats with recent history
    const allLaps={};
    for(const lap of laps) {
      const n=lap.driver_number;
      if(!allLaps[n]) allLaps[n]=[];
      if(lap.lap_duration) allLaps[n].push(lap);
    }
    S.liveLaps={};
    for(const [n,driverLaps] of Object.entries(allLaps)) {
      driverLaps.sort((a,b)=>a.lap_number-b.lap_number);
      const last=driverLaps[driverLaps.length-1];
      const best=driverLaps.reduce((b,l)=>(!b||l.lap_duration<b.lap_duration)?l:b,null);
      const recent=driverLaps.slice(-5).map(l=>l.lap_duration);
      S.liveLaps[n]={last,best,count:last?last.lap_number:0,recent};
    }
    S.sessionStints={};
    for(const st of stints) S.sessionStints[st.driver_number]=st;
    renderLiveSession();
  } catch(e) {
    document.getElementById('pane-live').innerHTML=
      '<div class="error-box">⚠️ Could not load timing data.<br><small>'+e.message+'</small><br><br><button onclick="loadLive()" style="margin-top:4px;padding:8px 18px;background:var(--red);color:#fff;border:none;border-radius:4px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer">Retry</button></div>';
  }
  S.refreshTimer=setTimeout(loadSessionData,S.isLive?LIVE_REFRESH_MS:IDLE_REFRESH_MS);
}

// ── Sparkline ─────────────────────────────────────────────────────────────────
function sparkline(laps,color) {
  if(!laps||laps.length<2) return '';
  const min=Math.min(...laps),max=Math.max(...laps),range=max-min||0.001;
  const W=36,H=14;
  const pts=laps.map((v,i)=>{
    const x=(i/(laps.length-1))*W;
    const y=((v-min)/range)*(H-2)+1; // faster=lower y (top)=better
    return x+','+y;
  }).join(' ');
  return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="display:block"><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+((laps.length-1)/(laps.length-1)*W)+'" cy="'+((laps[laps.length-1]-min)/range*(H-2)+1)+'" r="2" fill="'+color+'"/></svg>';
}

// ── Render live session ───────────────────────────────────────────────────────
function renderLiveSession() {
  const sess=S.session;
  const isRace=sess.session_type==='Race'||sess.session_name==='Race';
  const allNums=Object.keys(S.sessionDrivers).map(Number);
  const ranked=allNums.filter(n=>S.livePositions[n]).sort((a,b)=>(S.livePositions[a]?.position||99)-(S.livePositions[b]?.position||99));
  const unranked=allNums.filter(n=>!S.livePositions[n]);
  const maxLap=Math.max(0,...Object.values(S.liveLaps).map(l=>l.count));
  let fastestDur=Infinity,fastestDrv=null;
  for(const [n,ls] of Object.entries(S.liveLaps)) {
    if(ls.best&&ls.best.lap_duration<fastestDur){fastestDur=ls.best.lap_duration;fastestDrv=Number(n);}
  }
  const hdr=document.getElementById('headerStatus');
  hdr.innerHTML=S.isLive?'<div class="live-dot"></div>'+sess.session_name:'<span style="color:#888">'+sess.session_name+' – Results</span>';

  let rows='';
  for(const n of [...ranked,...unranked]) {
    const drv=S.sessionDrivers[n]; if(!drv) continue;
    const pos=S.livePositions[n],intv=S.liveIntervals[n],ldata=S.liveLaps[n],stint=S.sessionStints[n];
    const posNum=pos?pos.position:'—';
    const color=drv.team_colour?'#'+drv.team_colour:teamColor(drv.team_name);
    const code=drv.name_acronym||'???';
    const gap=intv?.gap_to_leader!=null?(intv.gap_to_leader===0?'Leader':'+'+intv.gap_to_leader.toFixed(3)):'—';
    const interval=intv?.interval!=null?(intv.interval===0?'—':'+'+Number(intv.interval).toFixed(3)):'—';
    const lastLap=ldata?.last?.lap_duration?fmtLap(ldata.last.lap_duration):'—';
    const isFastest=fastestDrv===n;
    const lapCls=isFastest?'mono fastest-lap':'mono';
    const lapCount=ldata?.count||'—';
    const tyre=stint?.compound?'<span class="tyre-badge tyre-'+stint.compound.toUpperCase()+'">'+stint.compound[0].toUpperCase()+'</span>':'—';
    const spark=sparkline(ldata?.recent||[],color);
    rows+=`<tr style="border-left:3px solid ${color}">
      <td>${posNum}</td>
      <td><span class="drv-code" style="color:${color}">${code}</span><span class="drv-full">${drv.full_name||''}</span></td>
      <td class="mono gap-leader">${gap}</td>
      ${isRace?'<td class="mono interval">'+interval+'</td>':''}
      <td class="${lapCls}">${lastLap}</td>
      <td class="spark-cell">${spark}</td>
      ${isRace?'<td>'+tyre+'</td>':''}
      ${isRace?'<td class="mono">'+lapCount+'</td>':''}
    </tr>`;
  }

  const lapInfo=isRace&&maxLap?'<div class="lap-big">'+maxLap+'</div><div class="lap-lbl">LAP</div>':'';
  document.getElementById('pane-live').innerHTML=`
    <div class="session-banner">
      <div>
        <div class="session-label">${sess.country_name||''}</div>
        <div class="session-name">${sess.session_name}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${sess.circuit_short_name||''}</div>
      </div>
      <div class="session-right">${lapInfo}</div>
    </div>
    <table class="timing-tbl">
      <thead><tr>
        <th>P</th><th>Driver</th><th>Gap</th>
        ${isRace?'<th>Int</th>':''}
        <th>Last</th><th></th>
        ${isRace?'<th>Tyre</th><th>Lap</th>':''}
      </tr></thead>
      <tbody>${rows||'<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--muted)">Waiting for data…</td></tr>'}</tbody>
    </table>
    ${!S.isLive?'<p style="text-align:center;font-size:12px;color:var(--muted);margin-top:12px">Final classification</p>':''}`;
}

// ── No session screen ─────────────────────────────────────────────────────────
async function renderNoSession() {
  document.getElementById('headerStatus').innerHTML='<span style="color:var(--muted)">No active session</span>';
  const pane=document.getElementById('pane-live');
  pane.innerHTML='<div class="loader"><div class="spinner"></div>Loading race info…</div>';

  // Load schedule
  if(!S.schedule) {
    const cached=cacheGet('schedule',3600000);
    if(cached) S.schedule=cached;
    try {
      const d=await jolpicaGet(JOLPICA+'/current.json');
      if(d?.MRData?.RaceTable?.Races){S.schedule=d.MRData.RaceTable.Races;cacheSet('schedule',S.schedule);}
    } catch(e) {}
  }

  // Load standings
  if(!S.driverStandings) {
    const cached=cacheGet('standings',3600000);
    if(cached){S.driverStandings=cached.drivers;S.constructorStandings=cached.constructors;}
    try {
      const [drv,con]=await Promise.all([jolpicaGet(JOLPICA+'/current/driverStandings.json'),jolpicaGet(JOLPICA+'/current/constructorStandings.json')]);
      const dl=drv?.MRData?.StandingsTable?.StandingsLists;
      const cl=con?.MRData?.StandingsTable?.StandingsLists;
      S.driverStandings=(dl&&dl.length)?dl[0].DriverStandings:[];
      S.constructorStandings=(cl&&cl.length)?cl[0].ConstructorStandings:[];
      cacheSet('standings',{drivers:S.driverStandings,constructors:S.constructorStandings});
    } catch(e) {}
  }

  // Load last race results
  if(!S.lastRace) {
    const cached=cacheGet('lastrace',7200000);
    if(cached) S.lastRace=cached;
    try {
      const d=await jolpicaGet(JOLPICA+'/current/last/results.json');
      const races=d?.MRData?.RaceTable?.Races;
      if(races&&races.length){S.lastRace=races[0];cacheSet('lastrace',S.lastRace);}
    } catch(e) { console.warn('Last race load failed:',e.message); }
  }

  const nextRace=findNextRace(S.schedule||[]);
  if(!nextRace){pane.innerHTML='<div style="text-align:center;padding:48px 24px"><h3>🏁 Season Complete</h3></div>';return;}

  const now=new Date();
  const raceUTC=new Date(nextRace.date+'T'+(nextRace.time||'12:00:00Z'));
  const msLeft=raceUTC-now;
  const daysLeft=Math.floor(msLeft/864e5);
  const hoursLeft=Math.floor((msLeft%864e5)/36e5);
  const countdownStr=msLeft<=0?'TODAY':(daysLeft===0?hoursLeft+'h':daysLeft);
  const countdownLabel=msLeft<=0?'':(daysLeft===0?'HRS TO GO':'DAYS TO GO');

  const sessionDefs=[
    {k:'FirstPractice',l:'Practice 1'},{k:'SecondPractice',l:'Practice 2'},
    {k:'ThirdPractice',l:'Practice 3'},{k:'SprintQualifying',l:'Sprint Shootout'},
    {k:'Sprint',l:'Sprint Race'},{k:'Qualifying',l:'Qualifying'},
  ];
  let sessionRows='';
  for(const def of sessionDefs) {
    if(nextRace[def.k]?.date) {
      sessionRows+='<div class="ns-session"><div class="ns-stype">'+def.l+'</div><div class="ns-sdot"></div><div class="ns-stime">'+fmtLocalTime(nextRace[def.k].date,nextRace[def.k].time)+'</div></div>';
    }
  }
  sessionRows+='<div class="ns-session ns-race"><div class="ns-stype">Race</div><div class="ns-sdot"></div><div class="ns-stime">'+fmtLocalTime(nextRace.date,nextRace.time)+'</div></div>';

  // Top 5
  let top5Html='';
  const top5=(S.driverStandings||[]).slice(0,5);
  if(top5.length) {
    const dRows=top5.map(s=>{
      const conId=s.Constructors?.[0]?.constructorId||'';
      const col=teamColor(conId);
      const flag=NAT_FLAG[s.Driver.nationality]||'';
      return '<div class="ns-driver"><div class="ns-dpos">'+s.position+'</div><div class="ns-dbar" style="background:'+col+'"></div><div class="ns-dinfo"><div class="ns-dname">'+flag+' '+s.Driver.givenName+' '+s.Driver.familyName+'</div><div class="ns-dteam">'+(s.Constructors?.[0]?.name||'')+'</div></div><div class="ns-dpts">'+s.points+'</div></div>';
    }).join('');
    top5Html='<div class="section-hd">Championship — Top 5</div><div class="ns-top5">'+dRows+'</div>';
  }

  // Last race podium
  let lastRaceHtml='';
  if(S.lastRace&&S.lastRace.Results) {
    const res=S.lastRace.Results;
    const podRes=res.slice(0,3);
    const podHtml=podRes.map((r,i)=>{
      const col=teamColor(r.Constructor?.constructorId||'');
      return '<div class="lr-pod p'+(i+1)+'"><div class="lr-pos" style="color:'+(i===0?'#c9a227':i===1?'#a0a0a0':'#cd7f32')+'">'+(i===0?'🥇':i===1?'🥈':'🥉')+'</div><div class="lr-code" style="color:'+col+'">'+r.Driver.code+'</div><div class="lr-pts">+'+r.points+' pts</div></div>';
    }).join('');
    const resRows=res.slice(0,10).map(r=>{
      const col=teamColor(r.Constructor?.constructorId||'');
      const fl=r.FastestLap?.rank==='1'?'<span class="hist-fastest">⚡FL</span>':'';
      return '<tr class="lr-row"><td>'+r.position+'</td><td><div style="display:flex;align-items:center;gap:6px"><div style="width:3px;height:22px;background:'+col+';border-radius:2px;flex-shrink:0"></div><div><div style="font-size:14px;font-weight:700">'+r.Driver.givenName[0]+'. '+r.Driver.familyName+'</div><div style="font-size:11px;color:var(--muted)">'+r.Constructor.name+'</div></div></div></td><td>'+fl+' '+r.points+'</td></tr>';
    }).join('');
    lastRaceHtml='<div class="section-hd">Last Race — '+S.lastRace.raceName+'</div><div class="lr-podium">'+podHtml+'</div><div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden"><table class="lr-tbl"><tbody>'+resRows+'</tbody></table></div>';
  }

  const circuit=nextRace.Circuit||{};
  const loc=circuit.Location||{};
  const circuitLine=[circuit.circuitName,loc.locality,loc.country].filter(Boolean).join(' · ');

  pane.innerHTML='<div class="ns-page">'+
    '<div class="ns-hero">'+
      '<div class="ns-round">ROUND '+nextRace.round+' · '+nextRace.season+'</div>'+
      '<div class="ns-racename">'+nextRace.raceName+'</div>'+
      '<div class="ns-circuit">'+circuitLine+'</div>'+
      '<div class="ns-countdown"><div class="ns-days-num">'+countdownStr+'</div>'+(countdownLabel?'<div class="ns-days-lbl">'+countdownLabel+'</div>':'')+'</div>'+
      '<div class="ns-racetime">Race: '+fmtLocalTime(nextRace.date,nextRace.time)+'</div>'+
    '</div>'+
    '<div id="ns-img-slot"></div>'+
    '<div id="ns-wx-slot"></div>'+
    '<div class="section-hd">Weekend Schedule</div>'+
    '<div class="ns-sessions">'+sessionRows+'</div>'+
    lastRaceHtml+
    top5Html+
  '</div>';

  // Circuit image (Wikipedia)
  const wikiKey=circuit.circuitId?CIRCUIT_WIKI[circuit.circuitId]:null;
  if(wikiKey) {
    get('https://en.wikipedia.org/api/rest_v1/page/summary/'+wikiKey).then(d=>{
      const img=d?.thumbnail?.source;
      const slot=document.getElementById('ns-img-slot');
      if(img&&slot) slot.innerHTML='<img class="ns-img" src="'+img+'" onerror="this.remove()">';
    }).catch(()=>{});
  }

  // Weather (Open-Meteo, no API key needed)
  if(loc.lat&&loc.long) {
    const wxUrl='https://api.open-meteo.com/v1/forecast?latitude='+loc.lat+'&longitude='+loc.long+'&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max&timezone=auto&forecast_days=10';
    get(wxUrl).then(wx=>{
      if(!wx?.daily) return;
      const raceDate=nextRace.date;
      const idx=wx.daily.time.indexOf(raceDate);
      if(idx<0) return;
      const code=wx.daily.weathercode[idx];
      const tMax=Math.round(wx.daily.temperature_2m_max[idx]);
      const tMin=Math.round(wx.daily.temperature_2m_min[idx]);
      const rain=wx.daily.precipitation_probability_max[idx];
      const icon=WX_ICON[code]||'🌡️';
      const desc=WX_DESC[code]||'';
      const slot=document.getElementById('ns-wx-slot');
      if(slot) slot.innerHTML='<div class="section-hd" style="margin-top:8px">Race Day Weather</div><div class="ns-weather"><div class="wx-icon">'+icon+'</div><div class="wx-info"><div class="wx-temp">'+tMax+'° / '+tMin+'°C</div><div class="wx-desc">'+desc+'</div>'+(rain>10?'<div class="wx-rain">💧 '+rain+'% chance of rain</div>':'')+'</div></div>';
    }).catch(()=>{});
  }
}

      jolpicaGet(JOLPICA+'/current/driverStandings.json'),

    ]);
    const dl=drv?.MRData?.StandingsTable?.StandingsLists;
    const cl=con?.MRData?.StandingsTable?.StandingsLists;
    S.driverStandings=(dl&&dl.length)?dl[0].DriverStandings:[];
    S.constructorStandings=(cl&&cl.length)?cl[0].ConstructorStandings:[];
    cacheSet('standings',{drivers:S.driverStandings,constructors:S.constructorStandings});

}

    for(const s of S.constructorStandings) {
      const color=teamColor(s.Constructor.constructorId);
      const pts=Number(s.points);
      const pct=Math.round((pts/maxPts)*100);
      const gap=Number(s.position)===1?'Leader':'–'+(maxPts-pts)+' pts';
      rows+=`<tr class="std-row" style="border-left:3px solid ${color}">
        <td>${s.position}</td>
        <td>
          <div style="display:flex;align-items:center;gap:7px">
            <div style="width:3px;height:28px;background:${color};border-radius:2px;flex-shrink:0"></div>

  }

// ── Schedule ──────────────────────────────────────────────────────────────────
async function loadSchedule() {
  try {
    const cached=cacheGet('schedule',3600000);
    if(cached){S.schedule=cached;renderSchedule();}
    const data=await jolpicaGet(JOLPICA+'/current.json');
    S.schedule=data.MRData.RaceTable.Races;
    cacheSet('schedule',S.schedule);
    renderSchedule();
  } catch(e) {
    const el=document.getElementById('scheduleContent');
    if(!S.schedule) el.innerHTML='<div class="error-box">⚠️ Could not load schedule.<br><small>'+e.message+'</small><br><br><button onclick="S.schedule=null;loadSchedule()" style="margin-top:4px;padding:8px 18px;background:var(--red);color:#fff;border:none;border-radius:4px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer">Retry</button></div>';
  }
}

function renderSchedule() {
  const el = document.getElementById('scheduleContent');
  if (!S.schedule) return;
  const now = new Date();
  let foundNext = false;
  const frag = document.createDocumentFragment();

  for (const race of S.schedule) {
    const rd = new Date(race.date + (race.time ? 'T'+race.time : 'T00:00:00Z'));
    const isPast = rd < now;
    const isNext = !isPast && !foundNext;
    if (isNext) foundNext = true;

    const card = document.createElement('div');
    const cls = ['race-card', isPast ? 'past' : '', isNext ? 'next-race' : ''].filter(Boolean).join(' ');
    card.className = cls;
    card.style.cursor = 'pointer';

    const circuit = race.Circuit || {};
    const loc = circuit.Location || {};
    const flag = getCountryFlag(loc.country || '');

    card.innerHTML =
      '<div class="rnd-badge">' + race.round + '</div>' +
      '<div class="race-info">' +
        (isNext ? '<div class="next-lbl">NEXT RACE</div>' : '') +
        '<div class="race-name">' + race.raceName + '</div>' +
        '<div class="race-circuit">' + flag + ' ' + (circuit.circuitName || '') + ' · ' + (loc.country || '') + '</div>' +
        '<div class="race-date">' + fmtDate(race.date) + '</div>' +
      '</div>' +
      '<div style="color:var(--muted);font-size:18px;padding-left:6px">›</div>';

    (function(r) {
      card.addEventListener('click', function() { showTrackDetail(r); });
    })(race);

    frag.appendChild(card);
  }

  el.innerHTML = '';
  if (frag.childElementCount === 0) {
    el.innerHTML = '<p style="color:var(--muted);text-align:center;padding:30px">No races found</p>';
  } else {
    el.appendChild(frag);
  }
}


// ── Track detail (opened from Schedule tab) ───────────────────────────────────

  S.trackCurrentRace = race;
  const schedHd = document.getElementById('scheduleHd');
  const content  = document.getElementById('scheduleContent');

  const circuit  = race.Circuit || {};
  const loc      = circuit.Location || {};
  const circuitId = circuit.circuitId || '';
  const stats    = CIRCUIT_STATS[circuitId] || {};
  const facts    = CIRCUIT_FACTS[circuitId] || [];
  const flag     = getCountryFlag(loc.country || '');

  schedHd.textContent = circuit.circuitName || race.raceName;

  // DRS badges
  const drsHtml = stats.drs
    ? Array.from({length: stats.drs}, (_, i) => '<span class="trk-drs-zone">DRS ' + (i+1) + '</span>').join('')

  // Stat grid
  const statGrid =
    '<div class="trk-stat-grid">' +
      '<div class="trk-stat"><div class="trk-stat-lbl">Length</div><div class="trk-stat-val">' + (stats.len || '—') + '</div></div>' +
      '<div class="trk-stat"><div class="trk-stat-lbl">Race Laps</div><div class="trk-stat-val">' + (stats.laps || '—') + '</div></div>' +
      '<div class="trk-stat"><div class="trk-stat-lbl">Corners</div><div class="trk-stat-val">' + (stats.corners || '—') + '</div></div>' +
      '<div class="trk-stat"><div class="trk-stat-lbl">DRS Zones</div><div class="trk-drs-bar" style="margin-top:6px">' + drsHtml + '</div></div>' +
      '<div class="trk-stat" style="grid-column:1/-1"><div class="trk-stat-lbl">Lap Record</div><div class="trk-stat-val">' + (stats.record || '—') + '</div>' +
        (stats.recordHolder ? '<div class="trk-stat-sub">' + stats.recordHolder + (stats.year ? ' · ' + stats.year : '') + '</div>' : '') +
      '</div>' +
    '</div>';

    // Recent winners — placeholder, populated async below
  const winnersHtml =
    '<div class="section-hd" style="margin-top:4px">Recent Winners</div>' +
    '<div id="trk-winners-slot" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:4px;color:var(--muted);font-size:13px">Loading recent winners…</div>';

  // Fun facts
  let factsHtml = '';
  if (facts.length) {
    const fItems = facts.map(function(f) {
      return '<div style="display:flex;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)">' +
        '<div style="color:var(--red);font-size:16px;flex-shrink:0;margin-top:1px">⚑</div>' +
        '<div style="font-size:13px;line-height:1.5;color:var(--text)">' + f + '</div>' +
      '</div>';
    }).join('');
    factsHtml =
      '<div class="section-hd" style="margin-top:4px">Did You Know?</div>' +
      '<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:4px">' +
        fItems +
      '</div>';
  }

  // Race date info
  const dateInfo =
    '<div style="font-size:13px;color:var(--muted);margin-bottom:12px">' +
      'Round ' + race.round + ' · ' + flag + ' ' +
      [loc.locality, loc.country].filter(Boolean).join(', ') +
      ' · ' + fmtDate(race.date) +
    '</div>';

  content.innerHTML =
    '<div class="trk-detail-back" id="scdBackBtn">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>' +
      'Schedule' +
    '</div>' +
    dateInfo +
    '<div id="trk-img-slot"><div class="trk-img-placeholder">Loading track image…</div></div>' +
    statGrid +
    winnersHtml +
    factsHtml;

  document.getElementById('scdBackBtn').addEventListener('click', backToSchedule);

  // Fetch recent winners (last 3 years) dynamically from Jolpica ─────────────
  (async function() {
    const slot = document.getElementById('trk-winners-slot');
    if (!slot || !circuitId) return;
    const now = new Date();
    const currentYear = now.getFullYear();
    const yearsToCheck = [currentYear, currentYear - 1, currentYear - 2];
    const winners = [];
    for (const yr of yearsToCheck) {
      try {
        const cacheKey = 'winner_' + circuitId + '_' + yr;
        let result = cacheGet(cacheKey, 86400000 * 30);
        if (!result) {
          const data = await jolpicaGet(JOLPICA + '/' + yr + '/circuits/' + circuitId + '/results.json');
          const races = data && data.MRData && data.MRData.RaceTable && data.MRData.RaceTable.Races;
          if (races && races.length && races[0].Results && races[0].Results.length) {
            const r = races[0].Results[0];
            result = {
              year: yr,
              driver: r.Driver.givenName[0] + '. ' + r.Driver.familyName,
              team: r.Constructor ? r.Constructor.name : '',
              constructorId: r.Constructor ? r.Constructor.constructorId : ''
            };
            cacheSet(cacheKey, result);
          }
        }
        if (result) winners.push(result);
      } catch(e) {
        console.warn('[F1] Winner fetch failed for ' + circuitId + ' ' + yr + ':', e.message);
      }
    }
    if (!winners.length) {
      if (slot) slot.textContent = 'No recent winner data available.';
      return;
    }
    const rows = winners.map(function(w, i) {
      const col = teamColor(w.constructorId || w.team.toLowerCase().replace(/ /g, '_'));
      const medal = i === 0 ? '🥇' : '🏆';
      return '<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)">' +
        '<div style="font-family:Share Tech Mono,monospace;font-size:13px;color:var(--muted);width:36px">' + w.year + '</div>' +
        '<div style="width:3px;height:26px;background:' + col + ';border-radius:2px;flex-shrink:0"></div>' +
        '<div style="flex:1">' +
          '<div style="font-size:15px;font-weight:700">' + w.driver + '</div>' +
          (w.team ? '<div style="font-size:11px;color:var(--muted)">' + w.team + '</div>' : '') +
        '</div>' +
        '<div style="font-size:20px">' + medal + '</div>' +
      '</div>';
    }).join('');
    if (slot) {
      slot.style.padding = '0';
      slot.innerHTML = rows;
    }
  })();

  // Fetch track image (async, injected when ready)
  const wikiKey = CIRCUIT_LAYOUT_WIKI[circuitId];
  if (wikiKey) {
    get('https://en.wikipedia.org/api/rest_v1/page/summary/' + wikiKey).then(function(data) {
      const imgSrc = (data && data.originalimage && data.originalimage.source)
        || (data && data.thumbnail && data.thumbnail.source);
      const slot = document.getElementById('trk-img-slot');
      if (imgSrc && slot) {
        const img = document.createElement('img');
        img.className = 'trk-layout-img';
        img.src = imgSrc;
        img.alt = circuit.circuitName || '';
        img.onerror = function() { this.remove(); };
        slot.innerHTML = '';
        slot.appendChild(img);
      } else if (slot) {
        slot.innerHTML = '';
      }
    }).catch(function() {
      const slot = document.getElementById('trk-img-slot');
      if (slot) slot.innerHTML = '';
    });
  } else {
    const slot = document.getElementById('trk-img-slot');
    if (slot) slot.innerHTML = '';
  }
}

async function loadHistory() {
  if(S.historyRound!==null) { renderHistoryDetail(); return; }
  document.getElementById('historyHd').textContent=YEAR+' Race Results';
  if(!S.schedule) {
    const cached=cacheGet('schedule',3600000);
    if(cached) S.schedule=cached;
    else {
      try{const d=await jolpicaGet(JOLPICA+'/current.json');if(d?.MRData?.RaceTable?.Races)S.schedule=d.MRData.RaceTable.Races;}catch(e){}
    }
  }
  if(!S.schedule){document.getElementById('historyContent').innerHTML='<div class="error-box">Could not load race list.</div>';return;}
  const now=new Date();
  const pastRaces=S.schedule.filter(r=>new Date(r.date+'T00:00:00Z')<now).reverse();
  if(!pastRaces.length){document.getElementById('historyContent').innerHTML='<p style="color:var(--muted);text-align:center;padding:40px">No completed races yet this season.</p>';return;}

  // Build using DOM elements — avoids ALL quote-escaping issues
  const container = document.createElement('div');
  for(const race of pastRaces) {
    const winner = race.Results ? race.Results[0]?.Driver?.familyName : null;
    const el = document.createElement('div');
    el.className = 'hist-race has-results';
    el.dataset.round = race.round;
    el.innerHTML =
      '<div class="hist-rnd">'+race.round+'</div>'+
      '<div class="hist-info">'+
        '<div class="hist-name">'+race.raceName+'</div>'+
        '<div class="hist-winner">'+fmtDate(race.date)+(winner ? ' · 🏆 '+winner : '')+'</div>'+
      '</div>'+
      '<div class="hist-arrow">›</div>';
    el.addEventListener('click', function() { showHistoryRound(this.dataset.round); });
    container.appendChild(el);
  }
  const content = document.getElementById('historyContent');
  content.innerHTML = '';
  content.appendChild(container);
}

// getRSS: fetches raw XML text via proxy (RSS doesn't support JSONP)
function getRSS(url, timeoutMs) {
  timeoutMs = timeoutMs || 10000;
  // allorigins /raw returns raw content; corsproxy returns raw content
  var proxies = [
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
    'https://corsproxy.io/?' + encodeURIComponent(url),
  ];
  var lastErr = null;
  function attempt(i) {
    if (i >= proxies.length) return Promise.reject(lastErr || new Error('RSS fetch failed'));
    var tP = new Promise(function(_, rej) { setTimeout(function() { rej(new Error('Timeout')); }, timeoutMs); });
    var fP = fetch(proxies[i]).then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    });
    return Promise.race([fP, tP]).catch(function(e) { lastErr = e; return attempt(i + 1); });
  }
  return attempt(0);
}

// parseRSS: extracts items from RSS 2.0 or Atom XML text
function parseRSS(xmlText, sourceName, sourceColor) {
  try {
    var parser = new DOMParser();
    var doc = parser.parseFromString(xmlText, 'text/xml');
    // RSS 2.0: <item>, Atom: <entry>
    var items = Array.from(doc.querySelectorAll('item, entry'));
    return items.slice(0, 12).map(function(item) {
      var title = (item.querySelector('title') || {}).textContent || '';
      // Atom link: <link href="..."/>, RSS: <link>text</link>
      var linkEl = item.querySelector('link[href]');
      var link = linkEl ? linkEl.getAttribute('href') : ((item.querySelector('link') || {}).textContent || '');
      // Description: <description>, <summary>, or <content>
      var descEl = item.querySelector('description') || item.querySelector('summary') || item.querySelector('content');
      var rawDesc = descEl ? descEl.textContent : '';
      // Strip HTML tags from description
      var tmp = document.createElement('div');
      tmp.innerHTML = rawDesc;
      var desc = (tmp.textContent || tmp.innerText || '').replace(/\s+/g, ' ').trim().slice(0, 160);
      // Date
      var dateStr = (item.querySelector('pubDate') || item.querySelector('published') ||
                     item.querySelector('updated') || {}).textContent || '';
      var date = dateStr ? new Date(dateStr) : new Date(0);
      return {
        title: title.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#039;/g,"'").replace(/&quot;/g,'"').trim(),
        link: link.trim(),
        desc: desc,
        ts: isNaN(date.getTime()) ? 0 : date.getTime(),
        source: sourceName,
        color: sourceColor,
      };
    }).filter(function(i) { return i.title.length > 0; });
  } catch(e) {
    console.warn('[F1 News] XML parse error:', e.message);
    return [];
  }
}

function setNewsTab(tab) {
  S.newsTab = tab;
  S.newsItems = null;
  S.newsPage = 0;
  document.getElementById('btnNews').classList.toggle('active', tab === 'news');
  document.getElementById('btnGossip').classList.toggle('active', tab === 'gossip');
  document.getElementById('newsContent').innerHTML = '<div class="loader"><div class="spinner"></div>Loading stories…</div>';
  loadNews();
}

async function loadNews() {
  var isGossip = S.newsTab === 'gossip';
  var cacheKey = isGossip ? 'news_gossip' : 'news_main';

  // Show cached data immediately while refreshing
  var cached = cacheGet(cacheKey, 15 * 60 * 1000); // 15 min cache
  if (cached && cached.length) {
    S.newsItems = cached.map(function(i) { return Object.assign({}, i, { date: new Date(i.ts) }); });
    renderNews();
    return;
  }

  document.getElementById('newsContent').innerHTML = '<div class="loader"><div class="spinner"></div>Fetching latest stories…</div>';

  var feeds = isGossip ? NEWS_FEEDS.gossip : NEWS_FEEDS.news;
  var allItems = [];

  // Fetch all feeds in parallel, gracefully ignore failures
  var results = await Promise.allSettled(feeds.map(function(feed) {
    return getRSS(feed.url, 10000).then(function(xml) {
      var items = parseRSS(xml, feed.name, feed.color);
      allItems = allItems.concat(items);
    });
  }));

  results.forEach(function(r, i) {
    if (r.status === 'rejected') console.warn('[F1 News] ' + feeds[i].name + ' failed:', r.reason.message);
  });

  // Sort newest first
  allItems.sort(function(a, b) { return b.ts - a.ts; });
  // Deduplicate by title similarity
  var seen = new Set();
  allItems = allItems.filter(function(item) {
    var key = item.title.toLowerCase().slice(0, 40);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  S.newsItems = allItems;
  S.newsPage = 0;
  cacheSet(cacheKey, allItems); // store raw (ts is a number, serialises fine)

  renderNews();
}

var NEWS_PAGE_SIZE = 20;

function renderNews() {
  var items = S.newsItems || [];
  var content = document.getElementById('newsContent');

  if (!items.length) {
    content.innerHTML = '<div class="news-empty">No stories loaded yet.<br>Pull down to refresh.</div>';
    return;
  }

  var page = S.newsPage || 0;
  var pageItems = items.slice(0, (page + 1) * NEWS_PAGE_SIZE);
  var hasMore = pageItems.length < items.length;

  var frag = document.createDocumentFragment();

  pageItems.forEach(function(item) {
    var card = document.createElement('div');
    card.className = 'news-card';

    var timeAgo = fmtTimeAgo(item.ts);

    var meta = document.createElement('div');
    meta.className = 'news-meta';
    meta.innerHTML =
      '<div class="news-dot" style="background:' + item.color + '"></div>' +
      '<span class="news-src">' + item.source + '</span>' +
      '<span class="news-time">' + timeAgo + '</span>';

    var headline = document.createElement('div');
    headline.className = 'news-headline';
    headline.textContent = item.title;

    card.appendChild(meta);
    card.appendChild(headline);

    if (item.desc) {
      var summary = document.createElement('div');
      summary.className = 'news-summary';
      summary.textContent = item.desc + (item.desc.length >= 160 ? '…' : '');
      card.appendChild(summary);
    }

    if (item.link) {
      (function(url) {
        card.addEventListener('click', function() { window.open(url, '_blank'); });
      })(item.link);
    }

    frag.appendChild(card);
  });

  if (hasMore) {
    var more = document.createElement('button');
    more.className = 'news-load-more';
    more.textContent = 'Load more stories';
    more.addEventListener('click', function() {
      S.newsPage = (S.newsPage || 0) + 1;
      renderNews();
    });
    frag.appendChild(more);
  }

  content.innerHTML = '';
  content.appendChild(frag);
}

function fmtTimeAgo(ts) {
  if (!ts) return '';
  var diff = Date.now() - ts;
  var mins = Math.floor(diff / 60000);
  if (mins < 2) return 'just now';
  if (mins < 60) return mins + 'm ago';
  var hours = Math.floor(diff / 3600000);
  if (hours < 24) return hours + 'h ago';
  var days = Math.floor(diff / 86400000);
  if (days < 7) return days + 'd ago';
  return fmtDate(new Date(ts).toISOString().slice(0, 10));
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function fmtLap(s) {
  if(s==null||isNaN(s)) return '—';
  const m=Math.floor(s/60),r=s%60;
  return m>0?m+':'+r.toFixed(3).padStart(6,'0'):r.toFixed(3);
}
function fmtDate(d) {
  return new Date(d+'T12:00:00Z').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function fmtLocalTime(date,time) {
  if(!date) return '—';
  const dt=new Date(date+'T'+(time||'12:00:00Z'));
  return dt.toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'})+' · '+dt.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}
function findNextRace(races) {
  const now=new Date();
  return races.find(r=>new Date(r.date+'T00:00:00Z')>=now);
}
